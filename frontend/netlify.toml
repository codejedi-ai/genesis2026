[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# API routes - proxy to serverless functions
[[redirects]]
  from = "/api/hello"
  to = "/.netlify/functions/hello"
  status = 200

[[redirects]]
  from = "/api/users"
  to = "/.netlify/functions/users"
  status = 200

# RIB Pulse SPA routes
[[redirects]]
  from = "/feed"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/capture"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/agents"
  to = "/index.html"
  status = 200

# Root route
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Catch-all for hash-based routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
